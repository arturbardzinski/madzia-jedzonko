
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jedzonko</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<main>
    <div class="summary">
        <div class="summary-item"><span class="label full">Kalorie:</span><span class="label short">K:</span> <span class="kcal" id="totalKcal">0</span> <span class="unit">kcal</span></div>
        <div class="summary-item"><span class="label full">Białko:</span><span class="label short">B:</span> <span class="protein" id="totalProtein">0</span> <span class="unit">g</span></div>
        <div class="summary-item"><span class="label full">Węglowodany:</span><span class="label short">W:</span> <span class="carbs" id="totalCarbs">0</span> <span class="unit">g</span></div>
        <div class="summary-item"><span class="label full">Tłuszcze:</span><span class="label short">T:</span> <span class="fat" id="totalFat">0</span> <span class="unit">g</span></div>
    </div>
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Szukaj ..." aria-label="Szukaj posiłków" />
    </div>

    <section class="meal-section" data-section="ŚNIADANIE">
    <h2>ŚNIADANIE</h2>
        <div class="section-content">
    <table>
        <thead>
            <tr>
                <th>✓</th>
                <th>Nazwa</th>
                <th>Kcal</th>
                <th>B</th>
                <th>W</th>
                <th>T</th>
            </tr>
        </thead>
        <tbody>
        <!-- rows are rendered dynamically from meals-data.js -->
        </tbody>
    </table>
        </div>
    </section>

    <section class="meal-section" data-section="OBIAD">
    <h2>OBIAD</h2>
        <div class="section-content">
    <table>
        <thead>
            <tr>
                <th>✓</th>
                <th>Nazwa</th>
                <th>Kcal</th>
                <th>B</th>
                <th>W</th>
                <th>T</th>
            </tr>
        </thead>
        <tbody>
        <!-- rows are rendered dynamically from meals-data.js -->
        </tbody>
    </table>
        </div>
    </section>

    <section class="meal-section" data-section="PRZEKĄSKA">
    <h2>PRZEKĄSKA</h2>
        <div class="section-content">
    <table>
        <thead>
            <tr>
                <th>✓</th>
                <th>Nazwa</th>
                <th>Kcal</th>
                <th>B</th>
                <th>W</th>
                <th>T</th>
            </tr>
        </thead>
        <tbody>
        <!-- rows are rendered dynamically from meals-data.js -->
        </tbody>
    </table>
        </div>
    </section>

    <section class="meal-section" data-section="KOLACJA">
    <h2>KOLACJA</h2>
        <div class="section-content">
    <table>
        <thead>
            <tr>
                <th>✓</th>
                <th>Nazwa</th>
                <th>Kcal</th>
                <th>B</th>
                <th>W</th>
                <th>T</th>
            </tr>
        </thead>
        <tbody>
        <!-- rows are rendered dynamically from meals-data.js -->
        </tbody>
    </table>
        </div>
    </section>
</main>
<div class="bottom-menu">
    <button id="prevSection" aria-label="Poprzednia sekcja">
        <span class="material-icons-outlined">arrow_back_ios</span>
    </button>
    <button id="copyMealsBtn" title="Kopiuj posiłki" aria-label="Kopiuj posiłki">
        <span class="material-icons-outlined">content_copy</span>
    </button>
    <button id="copyMacrosBtn" title="Kopiuj makro" aria-label="Kopiuj makro">
        <span class="material-icons-outlined">assessment</span>
    </button>
    <button id="nextSection" aria-label="Następna sekcja">
        <span class="material-icons-outlined">arrow_forward_ios</span>
    </button>
</div>


<div id="customAlert" class="custom-alert" role="dialog" aria-modal="true" aria-labelledby="customAlertText">
    <div class="custom-alert-content">
        <span id="customAlertText"></span>
        <button id="closeAlertBtn">OK</button>
    </div>
</div>

<script src="meals-data.js" defer></script>
<script src="script.js" defer></script>
</body>
</html>
